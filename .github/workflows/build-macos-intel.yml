name: Build macOS Intel

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the build to'
        required: true

permissions:
  contents: write

jobs:
  build-macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build macOS .app bundle
        run: >
          pyinstaller --noconfirm --windowed --name Outliner
          --collect-all trimesh --collect-all shapely --collect-all matplotlib
          outliner.py

      - name: Zip .app for release
        run: |
          cd dist
          zip -r Outliner-macos-x86_64.zip Outliner.app

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release upload "$TAG" dist/Outliner-macos-x86_64.zip --clobber
