name: Build macOS Intel

on:
  workflow_run:
    workflows: ["Build and Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the build to'
        required: true

permissions:
  contents: write

jobs:
  build-macos-intel:
    runs-on: macos-13
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.workflow_run.head_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build macOS .app bundle
        run: >
          pyinstaller --noconfirm --windowed --name Outliner
          --collect-all trimesh --collect-all shapely --collect-all matplotlib
          outliner.py

      - name: Zip .app for release
        run: |
          cd dist
          zip -r Outliner-macos-x86_64.zip Outliner.app

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.event.workflow_run.head_branch }}
        run: gh release upload "$TAG" dist/Outliner-macos-x86_64.zip --clobber
