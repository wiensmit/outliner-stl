name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        run: >
          pyinstaller --noconfirm --windowed --onefile --name Outliner
          --collect-all trimesh --collect-all shapely --collect-all matplotlib
          outliner.py

      - uses: actions/upload-artifact@v4
        with:
          name: Outliner-windows
          path: dist/Outliner.exe

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build macOS .app bundle
        run: >
          pyinstaller --noconfirm --windowed --name Outliner
          --collect-all trimesh --collect-all shapely --collect-all matplotlib
          outliner.py

      - name: Zip .app for release
        run: |
          cd dist
          zip -r Outliner-macos-${{ matrix.arch }}.zip Outliner.app

      - uses: actions/upload-artifact@v4
        with:
          name: Outliner-macos-${{ matrix.arch }}
          path: dist/Outliner-macos-${{ matrix.arch }}.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Outliner-windows/Outliner.exe
            artifacts/Outliner-macos-arm64/Outliner-macos-arm64.zip
            artifacts/Outliner-macos-x86_64/Outliner-macos-x86_64.zip
          generate_release_notes: true
